name: Docker Build and Deploy to AWS Lambda

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest

    env:
      AWS_REGION: eu-central-1
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v1

      - name: Build Docker image
        run: |
          docker build --no-cache --provenance=false -t miranda-search-service .

      - name: Tag Docker image
        run: |
          docker tag miranda-search-service:latest 430319687079.dkr.ecr.eu-central-1.amazonaws.com/miranda/search-service:latest

      - name: Push Docker image to ECR
        run: |
          docker push 430319687079.dkr.ecr.eu-central-1.amazonaws.com/miranda/search-service:latest

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Serverless Framework v3
        run: |
          npm install -g serverless@3

      - name: Install Serverless Prune plugin
        run: serverless plugin install -n serverless-prune-plugin

      - name: Deploy Lambda function with Serverless
        run: sls deploy --verbose --force
        env:
          AWS_REGION: eu-central-1
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
